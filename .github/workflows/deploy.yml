name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Crear firebase-config.js desde secrets
        run: |
          python3 -c "
          import os
          cfg = open('firebase-config.js', 'w')
          cfg.write('window.FIREBASE_CONFIG = {\n')
          cfg.write('    apiKey:            \"' + os.environ['FB_API_KEY'] + '\",\n')
          cfg.write('    authDomain:        \"' + os.environ['FB_AUTH_DOMAIN'] + '\",\n')
          cfg.write('    projectId:         \"' + os.environ['FB_PROJECT_ID'] + '\",\n')
          cfg.write('    storageBucket:     \"' + os.environ['FB_STORAGE_BUCKET'] + '\",\n')
          cfg.write('    messagingSenderId: \"' + os.environ['FB_SENDER_ID'] + '\",\n')
          cfg.write('    appId:             \"' + os.environ['FB_APP_ID'] + '\",\n')
          cfg.write('    measurementId:     \"' + os.environ['FB_MEASUREMENT_ID'] + '\"\n')
          cfg.write('};\n')
          cfg.close()
          print('firebase-config.js creado')
          "
        env:
          FB_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FB_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FB_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}

      - name: Deploy
        run: npx firebase-tools deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}
