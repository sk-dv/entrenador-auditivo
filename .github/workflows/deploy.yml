name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copiar sitio a _site
        run: |
          mkdir _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' . _site/

      - name: Inyectar Firebase config en HTML
        run: |
          sed -i 's|<script src="firebase-config.js"></script>|<script>window.FIREBASE_CONFIG={apiKey:"${{ secrets.FIREBASE_API_KEY }}",authDomain:"${{ secrets.FIREBASE_AUTH_DOMAIN }}",projectId:"${{ secrets.FIREBASE_PROJECT_ID }}",storageBucket:"${{ secrets.FIREBASE_STORAGE_BUCKET }}",messagingSenderId:"${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",appId:"${{ secrets.FIREBASE_APP_ID }}",measurementId:"${{ secrets.FIREBASE_MEASUREMENT_ID }}"}</script>|' _site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
