name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copiar sitio a _site
        run: |
          mkdir _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' . _site/

      - name: Crear firebase-config.js desde secrets
        run: |
          {
            echo 'window.FIREBASE_CONFIG = {'
            echo '    apiKey:            "${{ secrets.FIREBASE_API_KEY }}",'
            echo '    authDomain:        "${{ secrets.FIREBASE_AUTH_DOMAIN }}",'
            echo '    projectId:         "${{ secrets.FIREBASE_PROJECT_ID }}",'
            echo '    storageBucket:     "${{ secrets.FIREBASE_STORAGE_BUCKET }}",'
            echo '    messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",'
            echo '    appId:             "${{ secrets.FIREBASE_APP_ID }}",'
            echo '    measurementId:     "${{ secrets.FIREBASE_MEASUREMENT_ID }}"'
            echo '};'
          } > _site/firebase-config.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
